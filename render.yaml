databases:
  - name: kiskaurldb
    plan: free
    databaseName: kiskaurldb
    user: kiskaurluser

services:
  - type: web
    plan: free
    name: kiskaURL
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'python -m gunicorn kiskaURL.asgi:application -k uvicorn.workers.UvicornWorker'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kiskaurldb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4